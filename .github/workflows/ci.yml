name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx

    - name: Run unit tests
      run: |
        pytest tests/ -v

    - name: Run Imports Test
      run: |
        python -c "import app, utils, tasks, auth, database, models, storage, config; print('Python file imports test passed successfully!')"

    - name: Build Docker Image
      run: |
        docker build -t pdf-translator-tts:latest .
