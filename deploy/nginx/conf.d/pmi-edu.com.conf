# Main application — https://pmi-edu.com
upstream pdf_translator_app {
    server web:8000;
}

server {
    listen 80;
    server_name pmi-edu.com www.pmi-edu.com;

    client_max_body_size 12M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://pmi-edu.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name www.pmi-edu.com;

    ssl_certificate     /etc/letsencrypt/live/pmi-edu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pmi-edu.com/privkey.pem;

    return 301 https://pmi-edu.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name pmi-edu.com;

    ssl_certificate     /etc/letsencrypt/live/pmi-edu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pmi-edu.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 12M;

    location / {
        proxy_pass http://pdf_translator_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
